<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABA v6.7 - GESTOR ELITE RJ</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; --gold: #fbbc04; --highlight: #fff9c4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f3f4; margin: 0; padding: 15px; color: #202124; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 8px solid var(--blue); }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #dadce0; }
        .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: 600; padding: 10px 15px; transition: 0.2s; font-size: 13px; }
        .btn-sec { background: #5f6368; color: white; }
        .btn-danger { background: var(--red); color: white; margin-left: auto; }
        .btn-main { background: var(--blue); color: white; width: 100%; padding: 18px; font-size: 18px; margin-top: 20px; text-transform: uppercase; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { border: 1px solid #dadce0; padding: 15px; border-radius: 8px; background: #fff; }
        .card label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--blue); font-size: 14px; }
        textarea { width: 100%; height: 160px; border: 2px solid #dfe1e5; border-radius: 6px; padding: 12px; box-sizing: border-box; font-family: 'Consolas', monospace; font-size: 18px; resize: none; }
        .horarios-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .h-box { background: #f8f9fa; border: 1px solid #dadce0; padding: 10px; border-radius: 6px; text-align: center; }
        .h-box span { font-size: 11px; font-weight: bold; color: #5f6368; display: block; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #bdc1c6; border-radius: 4px; text-align: center; font-weight: bold; font-size: 18px; box-sizing: border-box; }
        .result-area { margin-top: 30px; display: none; }
        .status-chip { background: #e8f0fe; color: var(--blue); padding: 12px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #f8f9fa; color: #5f6368; font-size: 12px; border: 1px solid #eee; padding: 12px; }
        td { border: 1px solid #eee; padding: 12px; text-align: center; font-weight: bold; }
        .row-prioridade { background: var(--highlight); }
        .badge { padding: 4px 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; }
        .A { background: var(--red); } .B { background: var(--gold); color: #000; } .C { background: var(--green); }
        .tag-alerta { background: var(--gold); color: black; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }
        .ternos-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .terno-card { background: #f8f9fa; border: 1px solid #dadce0; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; }
        .terno-mestre { border: 2px solid var(--gold); background: #fffde7; }
        .terno-card small { display: block; color: var(--blue); font-size: 9px; margin-bottom: 4px; text-transform: uppercase; }
    </style>
</head>
<body onload="carregar()">

<div class="container">
    <div class="nav-bar">
        <button class="btn btn-sec" onclick="exportarJSON()">💾 SALVAR BACKUP</button>
        <button class="btn btn-sec" onclick="document.getElementById('imp').click()">📂 ABRIR BACKUP</button>
        <input type="file" id="imp" style="display:none" accept="application/json" onchange="importarJSON(event)">
        <button class="btn btn-danger" onclick="reset()">🧨 RESETAR SISTEMA</button>
    </div>

    <h2 style="text-align:center; color:var(--blue); margin-bottom:5px;">SABA v6.7 - GESTOR ELITE RJ</h2>
    <p style="text-align:center; font-size:12px; color:#70757a; margin-bottom:25px;">Homologação Concluída | Persistência e Backup Ativos</p>

    <div class="main-grid">
        <div class="card">
            <label>📋 LISTA DE ATRASADOS</label>
            <textarea id="lista" placeholder="Cole os grupos aqui..."></textarea>
        </div>
        <div class="card">
            <label>🕒 RESULTADO PARA ATUALIZAR</label>
            <div class="horarios-grid">
                <div class="h-box"><span>CORUJA</span><input type="text" id="rCOR" placeholder="00"></div>
                <div class="h-box"><span>PPT</span><input type="text" id="rPPT" placeholder="00"></div>
                <div class="h-box"><span>PTM</span><input type="text" id="rPTM" placeholder="00"></div>
                <div class="h-box"><span>PT</span><input type="text" id="rPT" placeholder="00"></div>
                <div class="h-box"><span>PTV</span><input type="text" id="rPTV" placeholder="00"></div>
                <div class="h-box"><span>PTN</span><input type="text" id="rPTN" placeholder="00"></div>
            </div>
        </div>
    </div>

    <button class="btn btn-main" onclick="executar()">ATUALIZAR CICLO E GERAR 08 TERNOS</button>

    <div id="saida" class="result-area">
        <div class="status-chip">
            <span id="info">STATUS: PRONTO PARA TESTE</span>
            <span id="hora-log">00:00:00</span>
        </div>
        <table>
            <thead><tr><th>GRUPO</th><th>BICHO</th><th>MILHAR SUGERIDA</th><th>BASE</th></tr></thead>
            <tbody id="corpoF"></tbody>
        </table>
        <div id="corpoT" class="ternos-container"></div>
    </div>
</div>

<script>
    const db = {
        1:{n:"Avestruz",b:"A",m:"5602"}, 2:{n:"Águia",b:"A",m:"9205"}, 3:{n:"Burro",b:"A",m:"9911"}, 4:{n:"Borboleta",b:"A",m:"3913"}, 5:{n:"Cachorro",b:"A",m:"7820"},
        6:{n:"Cabra",b:"B",m:"4321"}, 7:{n:"Carneiro",b:"B",m:"7926"}, 8:{n:"Camelo",b:"B",m:"3632"}, 9:{n:"Cobra",b:"B",m:"6033"}, 10:{n:"Coelho",b:"B",m:"5239"},
        11:{n:"Cavalo",b:"B",m:"2343"}, 12:{n:"Elefante",b:"B",m:"8846"}, 13:{n:"Galo",b:"B",m:"9651"}, 14:{n:"Gato",b:"B",m:"4656"}, 15:{n:"Jacaré",b:"B",m:"8358"},
        16:{n:"Leão",b:"C",m:"7562"}, 17:{n:"Macaco",b:"C",m:"7366"}, 18:{n:"Porco",b:"C",m:"9270"}, 19:{n:"Pavão",b:"C",m:"2175"}, 20:{n:"Peru",b:"C",m:"2778"},
        21:{n:"Touro",b:"C",m:"5784"}, 22:{n:"Tigre",b:"C",m:"6987"}, 23:{n:"Urso",b:"C",m:"7792"}, 24:{n:"Veado",b:"C",m:"1896"}, 25:{n:"Vaca",b:"C",m:"6099"}
    };

    let cicloGlobal = [];

    function carregar() {
        const salvo = localStorage.getItem('saba_v67_final');
        if(salvo) { cicloGlobal = JSON.parse(salvo); renderizarPalpites("CICLO RECUPERADO"); }
    }

    function extrair(txt) { return (txt.match(/\d+/g) || []).map(Number).filter(n => n >= 1 && n <= 25); }

    function executar() {
        const elLista = document.getElementById('lista');
        const ids = ['rCOR', 'rPPT', 'rPTM', 'rPT', 'rPTV', 'rPTN'];
        let novaEntrada = [...new Set(extrair(elLista.value))];
        
        if(novaEntrada.length > 0) cicloGlobal = novaEntrada;
        if(cicloGlobal.length === 0) return alert("Erro: Cole a lista de atrasados primeiro!");

        let resSort = [], hLabel = "";
        for (let id of ids) {
            let n = extrair(document.getElementById(id).value);
            if(n.length > 0) { resSort = n; hLabel = id.replace('r',''); break; }
        }
        if(resSort.length === 0) return alert("Erro: Informe o resultado para atualizar o ciclo!");

        resSort.forEach(n => {
            cicloGlobal = cicloGlobal.filter(x => x !== n);
            cicloGlobal.push(n);
        });

        localStorage.setItem('saba_v67_final', JSON.stringify(cicloGlobal));
        elLista.value = ""; 
        ids.forEach(id => document.getElementById(id).value = "");
        renderizarPalpites(`ATUALIZADO VIA ${hLabel}`);
    }

    function renderizarPalpites(msg) {
        if(cicloGlobal.length === 0) return;
        document.getElementById('saida').style.display = 'block';
        document.getElementById('info').innerText = `STATUS: ${msg}`;
        document.getElementById('hora-log').innerText = new Date().toLocaleTimeString('pt-BR');

        // Identifica o líder de cada base para cercamento
        const topA = cicloGlobal.find(n => db[n].b === 'A');
        const topB = cicloGlobal.find(n => db[n].b === 'B');
        const topC = cicloGlobal.find(n => db[n].b === 'C');
        const elite = [topA, topB, topC].filter(Boolean);

        // Tabela Principal (Top 5 da Fila)
        document.getElementById('corpoF').innerHTML = cicloGlobal.slice(0, 5).map((n, i) => `
            <tr class="${elite.includes(n) ? 'row-prioridade' : ''}">
                <td>${n.toString().padStart(2,'0')} ${elite.includes(n) ? '<span class="tag-alerta">ELITE</span>' : ''}</td>
                <td>${db[n].n}</td>
                <td style="color:var(--blue)">${db[n].m}</td>
                <td><span class="badge ${db[n].b}">${db[n].b}</span></td>
            </tr>
        `).join('');

        // Geração de 08 Ternos Combinados (Cercamento)
        let htmlTernos = "";
        for(let i=0; i<8; i++) {
            let combo = cicloGlobal.slice(i, i+3);
            if(combo.length < 3) combo = [...combo, ...cicloGlobal.slice(0, 3 - combo.length)];
            
            htmlTernos += `
                <div class="terno-card ${i === 0 ? 'terno-mestre' : ''}">
                    <small>${i === 0 ? '🔥 Terno Principal' : 'Terno ' + (i+1)}</small>
                    ${combo.map(n => n.toString().padStart(2,'0')).join(' - ')}
                </div>`;
        }
        document.getElementById('corpoT').innerHTML = htmlTernos;
    }

    function exportarJSON() {
        const b = new Blob([JSON.stringify(cicloGlobal)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "saba_backup.json"; a.click();
    }
    function importarJSON(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            cicloGlobal = JSON.parse(ev.target.result);
            localStorage.setItem('saba_v67_final', JSON.stringify(cicloGlobal));
            renderizarPalpites("BACKUP RECUPERADO");
            alert("Backup restaurado!");
        };
        r.readAsText(e.target.files[0]);
    }
    function reset() { if(confirm("Deseja resetar o ciclo?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
